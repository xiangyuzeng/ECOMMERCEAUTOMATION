services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerceautomation
    restart: unless-stopped

    ports:
      - "${PORT:-3000}:3000"

    # host.docker.internal allows container to reach services on host machine
    # Works on Mac (Docker Desktop) and Windows (Docker Desktop)
    # On Linux: add --add-host=host.docker.internal:host-gateway to docker run
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      # AdsPower runs on your host machine, not inside Docker
      # Use host.docker.internal to reach it from the container
      - ADSPOWER_API_URL=${ADSPOWER_API_URL:-http://host.docker.internal:50325}
      - ADSPOWER_API_KEY=${ADSPOWER_API_KEY:-}
      - ADSPOWER_PROFILE_ID=${ADSPOWER_PROFILE_ID:-}

    volumes:
      # Multi-product data storage (persistent)
      - ./data:/app/data

      # Configuration (read-only — edit on host, restart to apply)
      - ./config.json:/app/config.json:ro

      # Input/output directories (shared with host for easy file access)
      - ./inputs:/app/inputs
      - ./outputs:/app/outputs
      - ./processed:/app/processed
      - ./logs:/app/logs
